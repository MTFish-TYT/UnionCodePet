<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>UnionCodePet Pet</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei UI', sans-serif;
      }
      .pet-root {
        position: fixed;
        bottom: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .pet-bubble {
        background: rgba(20, 22, 36, 0.92);
        color: #c0caf5;
        font-size: 12px;
        line-height: 1.4;
        padding: 5px 8px 5px 10px;
        border-radius: 8px;
        margin-bottom: 4px;
        max-width: 240px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border: 1px solid rgba(122, 162, 247, 0.3);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        user-select: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .pet-bubble-text {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pet-bubble-menu {
        flex-shrink: 0;
        padding: 0 4px;
        border-radius: 4px;
        font-size: 13px;
        opacity: 0.7;
      }
      .pet-bubble-menu:hover {
        opacity: 1;
        background: rgba(122, 162, 247, 0.2);
      }
      .pet-bubble-expanded {
        max-width: 340px;
        max-height: 180px;
        overflow-y: auto;
        white-space: normal;
        word-break: break-word;
      }
      .pet-bubble-expanded .pet-bubble-text {
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./pet/main.tsx"></script>
  </body>
</html>
